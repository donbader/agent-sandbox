name: flox
options:
  cache:
    type: boolean
    required: false
    default: true
    description: "Persist /nix store across container restarts using a named Docker volume"

contributes:
  runtime:
    extra_builds:
      - "RUN curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install linux --extra-conf \"sandbox = false\" --init none --no-confirm"
      - "ENV PATH=/nix/var/nix/profiles/default/bin:$PATH"
      - "RUN nix profile install --accept-flake-config github:flox/flox"
      - "RUN chown -R agent:agent /nix"
    pre_entrypoint:
      - '. /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh 2>/dev/null || true'
    volumes:
      - '{{ if .plugin.options.cache }}{{ .agent.name }}-nix-store:/nix{{ end }}'
