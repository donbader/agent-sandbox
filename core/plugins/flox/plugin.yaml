name: flox
options:
  volume_strategy:
    type: string
    required: false
    default: fleet
    description: "Volume strategy for /nix store persistence: 'fleet' shares across agents, 'per-agent' isolates per agent, 'none' disables persistence"

contributes:
  runtime:
    extra_builds:
      - "RUN curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install linux --extra-conf \"sandbox = false\" --init none --no-confirm"
      - "ENV PATH=/nix/var/nix/profiles/default/bin:$PATH"
      - "RUN nix profile install --accept-flake-config github:flox/flox"
      - "RUN chown agent:agent /nix/store && chown -R agent:agent /nix/var"
    pre_entrypoint:
      - '. /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh 2>/dev/null || true'
{{- if eq .plugin.options.volume_strategy "per-agent" }}
    namespaced_volumes:
      - "nix-store:/nix"
{{- else if eq .plugin.options.volume_strategy "fleet" }}
    raw_volumes:
      - "nix-store:/nix"
{{- end }}
