name: github-pat
options:
  token:
    type: string
    required: true
    description: "GitHub PAT env var reference (e.g. ${GITHUB_PAT})"
  deny_paths:
    type: array
    required: false
    description: "URL path patterns to block. Format: METHOD /path/glob or /path/glob"

contributes:
  runtime:
    extra_builds:
      # Agent container needs dummy tokens so git/gh CLI attempt auth
      # (the gateway intercepts and injects real credentials)
      - "ENV GH_TOKEN=dummy GITHUB_TOKEN=dummy"
  gateway:
    egress:
      - hosts: ["api.github.com", "github.com"]
        middlewares:
          - "./src/github-auth.ts"
        {{- if .plugin.options.deny_paths }}
        deny_paths:
          {{- range .plugin.options.deny_paths }}
          - "{{ . }}"
          {{- end }}
        {{- end }}
