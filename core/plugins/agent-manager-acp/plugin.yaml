name: agent-manager-acp
assets:
  - path: agent-manager/
    exclude: [node_modules, dist]

options:
  acp_command:
    type: array
    required: true
    description: "Command to spawn the agent via ACP over stdio (e.g. [codex-acp] or [claude, --dangerously-skip-permissions])"

contributes:
  runtime:
    build_stage:
      steps:
        - "COPY {{ asset \"agent-manager\" }}/ /src/"
        - "RUN --mount=type=cache,target=/root/.npm cd /src && npm install && npm run build"
      artifacts:
        - from: /src/dist
          to: /opt/agent-manager/dist
        - from: /src/node_modules
          to: /opt/agent-manager/node_modules
    extra_builds:
      - "RUN echo '{\"acp_command\":{{ toJSON (index .plugin.options \"acp_command\") }},\"cwd\":\"{{ .agent.runtime.cwd }}\"}' > /opt/agent-manager/config.json"
