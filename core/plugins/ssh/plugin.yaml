name: ssh
options:
  port:
    type: integer
    required: false
    default: 2222
    description: "SSH port to expose"
  authorized_keys:
    type: project-path
    required: true
    description: "Path to public key file. Must use @fleet/ prefix (e.g. @fleet/ssh_key.pub)."

contributes:
  runtime:
    cap_add:
      - SYS_CHROOT
    skip_userns: true
    extra_builds:
      - "RUN apt-get update && apt-get install -y --no-install-recommends openssh-server && rm -rf /var/lib/apt/lists/*"
      - "RUN mkdir -p /run/sshd /home/agent/.ssh"
      - "RUN rm -f /etc/ssh/ssh_host_ed25519_key /etc/ssh/ssh_host_ed25519_key.pub && ssh-keygen -t ed25519 -f /etc/ssh/ssh_host_ed25519_key -N '' -q"
      - "RUN sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config"
      - "RUN sed -i 's/^#*Port.*/Port {{ .plugin.options.port }}/' /etc/ssh/sshd_config"
      - "COPY {{ .plugin.options.authorized_keys }} /home/agent/.ssh/authorized_keys"
      - "RUN chmod 700 /home/agent/.ssh && chmod 600 /home/agent/.ssh/authorized_keys"
    pre_entrypoint:
      - "/usr/sbin/sshd -p {{ .plugin.options.port }}"
  gateway:
    ingress:
      - listen: "{{ .plugin.options.port }}"
        target: "{{ .agent.name }}:{{ .plugin.options.port }}"
