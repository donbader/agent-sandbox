name: deploy-version
description: Inject project and core version info as container environment variables (compose-level)

options:
  config_version_key:
    type: string
    required: false
    default: "CONFIG_VERSION"
    description: "Environment variable name for the config repo git hash"
  core_version_key:
    type: string
    required: false
    default: "CORE_VERSION"
    description: "Environment variable name for the agent-sandbox core version"

contributes:
  runtime:
    environment:
      "{{ .plugin.options.config_version_key }}": "{{ .generator.git_hash }}"
      "{{ .plugin.options.core_version_key }}": "{{ .generator.core_version }}"
