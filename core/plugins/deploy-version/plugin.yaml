name: deploy-version
description: Inject core version as a container environment variable (compose-level)

options:
  core_version_key:
    type: string
    required: false
    default: "CORE_VERSION"
    description: "Environment variable name for the agent-sandbox core version"

contributes:
  runtime:
    environment:
      "{{ .plugin.options.core_version_key }}": "{{ .generator.core_version }}"
