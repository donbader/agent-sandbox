name: deploy-version
description: Inject project and core version info into the agent container

options:
  version_file:
    type: string
    required: false
    default: "/etc/deploy-version"
    description: "Path where the config repo git hash is written at build time"
  core_version_key:
    type: string
    required: false
    default: "CORE_VERSION"
    description: "Environment variable name for the agent-sandbox core version"

contributes:
  runtime:
    extra_builds:
      - "COPY .git /tmp/.git"
      - "RUN git -C /tmp rev-parse --short HEAD > {{ .plugin.options.version_file }} 2>/dev/null || echo unknown > {{ .plugin.options.version_file }}"
      - "RUN rm -rf /tmp/.git"
    environment:
      "{{ .plugin.options.core_version_key }}": "{{ .generator.core_version }}"
