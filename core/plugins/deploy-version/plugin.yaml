name: deploy-version
description: Inject project and core version info as container environment variables (compose-level)

assets:
  - path: scripts/

functions:
  gitDescribe:
    script: "./scripts/git-describe.sh"

options:
  config_version_key:
    type: string
    required: false
    default: "CONFIG_VERSION"
    description: "Environment variable name for the config repo version (git describe)"
  core_version_key:
    type: string
    required: false
    default: "CORE_VERSION"
    description: "Environment variable name for the agent-sandbox core version"

contributes:
  runtime:
    environment:
      "{{ .plugin.options.config_version_key }}": "{{ call .plugin.gitDescribe }}"
      "{{ .plugin.options.core_version_key }}": "{{ .generator.core_version }}"
