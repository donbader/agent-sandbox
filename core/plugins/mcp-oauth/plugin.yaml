name: mcp-oauth
options:
  providers:
    type: object
    required: true
    description: "Map of provider name to MCP config (each needs at least mcp_url)"

  callback_url:
    type: string
    required: false
    description: "Public callback URL (derived from request if not set)"

  volume_strategy:
    type: string
    required: false
    default: "per_agent"
    description: "Token storage strategy: per_agent (each agent has its own tokens), fleet (all agents share tokens), none (ephemeral, tokens lost on restart)"

contributes:
  gateway:
    egress:
{{- range $name, $cfg := .plugin.options.providers }}
      - hosts: ["{{ index $cfg "mcp_url" }}"]
        middlewares:
          - "./src/oauth.ts"
{{- end }}
{{- if eq (or .plugin.options.volume_strategy "per_agent") "fleet" }}
    raw_volumes:
      - "mcp-oauth-data:/data/plugins/mcp-oauth"
{{- else if ne (or .plugin.options.volume_strategy "per_agent") "none" }}
    namespaced_volumes:
      - "mcp-oauth-data:/data/plugins/mcp-oauth"
{{- end }}
    routes:
      - path: "/callback"
        handler: "./src/callback.ts"
      - path: "/login"
        handler: "./src/login.ts"
      - path: "/status"
        handler: "./src/status.ts"
      - path: "/disconnect"
        handler: "./src/disconnect.ts"
