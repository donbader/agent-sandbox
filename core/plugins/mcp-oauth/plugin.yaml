name: mcp-oauth
options:
  providers:
    type: object
    required: true
    description: "Map of provider name to MCP config (each needs at least mcp_url)"
    additionalProperties:
      type: object
      properties:
        mcp_url:
          type: string
          required: true
          description: "MCP server URL for this provider"
        client_id:
          type: string
          description: "OAuth client ID (optional — uses dynamic registration if omitted)"
        client_secret:
          type: string
          description: "OAuth client secret (optional — uses dynamic registration if omitted)"
        authorize_endpoint:
          type: string
          description: "OAuth authorize URL (optional — discovered from .well-known if omitted)"
        token_endpoint:
          type: string
          description: "OAuth token URL (optional — discovered from .well-known if omitted)"
        scopes:
          type: string
          description: "Space-separated OAuth scopes (optional — uses provider defaults if omitted)"

  callback_url:
    type: string
    required: false
    description: "Public callback URL (derived from request if not set)"

  volume_strategy:
    type: string
    required: false
    default: "per_agent"
    description: "Token storage strategy: per_agent (each agent has its own tokens), fleet (all agents share tokens), none (ephemeral, tokens lost on restart)"

contributes:
  gateway:
    egress:
{{- range $name, $cfg := .plugin.options.providers }}
      - hosts: ["{{ index $cfg "mcp_url" }}"]
        middlewares:
          - "./src/oauth.ts"
{{- end }}
{{- if eq (or .plugin.options.volume_strategy "per_agent") "fleet" }}
    raw_volumes:
      - "mcp-oauth-data:/data/plugins/mcp-oauth"
{{- else if ne (or .plugin.options.volume_strategy "per_agent") "none" }}
    namespaced_volumes:
      - "mcp-oauth-data:/data/plugins/mcp-oauth"
{{- end }}
    routes:
      - path: "/callback"
        handler: "./src/callback.ts"
      - path: "/login"
        handler: "./src/login.ts"
      - path: "/status"
        handler: "./src/status.ts"
      - path: "/disconnect"
        handler: "./src/disconnect.ts"
