name: mcp-oauth
options:
  providers:
    type: object
    required: true
    description: "Map of provider name to MCP config (each needs mcp_url, client_id, client_secret)"
  token_dir:
    type: string
    required: false
    default: "/data/oauth-tokens"
    description: "Directory for OAuth token files"

contributes:
  gateway:
    volumes:
      - "oauth-tokens:{{ .plugin.options.token_dir }}"
    middlewares:
      - custom: "./middlewares/oauth.go"
    routes:
      - path: "/callback"
        handler: "./handlers/callback.go"
