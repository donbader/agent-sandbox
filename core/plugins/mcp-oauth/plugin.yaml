name: mcp-oauth
options:
  providers:
    type: object
    required: true
    description: "Map of provider name to MCP config"
  token_dir:
    type: string
    required: false
    default: "/data/oauth-tokens"
    description: "Directory for OAuth token files"
  token_file:
    type: string
    required: false
    default: "/data/oauth-tokens/token.json"
    description: "Path to OAuth token JSON file"

contributes:
  gateway:
    volumes:
      - "oauth-tokens:{{ .options.token_dir }}"
    middlewares:
      - custom: "./middlewares/oauth.go"
