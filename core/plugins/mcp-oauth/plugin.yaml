name: mcp-oauth
options:
  providers:
    type: object
    required: true
    description: "Map of provider name to MCP config (each needs at least mcp_url)"
  token_dir:
    type: string
    required: false
    default: "/data/oauth-tokens"
    description: "Directory for OAuth token files"
  callback_url:
    type: string
    required: false
    description: "Public callback URL (derived from request if not set)"

contributes:
  gateway:
    services:
{{- range $name, $cfg := .plugin.options.providers }}
      - url: "{{ index $cfg "mcp_url" }}"
{{- end }}
    volumes:
      - "oauth-tokens:{{ .plugin.options.token_dir }}"
    middlewares:
      - script: "./src/oauth.ts"
    routes:
      - path: "/callback"
        handler: "./src/callback.ts"
      - path: "/login"
        handler: "./src/login.ts"
