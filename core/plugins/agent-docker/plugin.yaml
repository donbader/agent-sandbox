name: agent-docker
assets:
  - path: cmd/docker-proxy/
    exclude: ["*_test.go"]

options:
  allowed_images:
    type: array
    items:
      type: string
    required: true
    description: "Glob patterns for allowed Docker images (e.g. node:20-*, postgres:16-*)"
  max_containers:
    type: number
    required: false
    default: 5
    description: "Maximum concurrent containers the agent can spawn"
  memory:
    type: string
    required: false
    default: "2g"
    description: "Memory limit per spawned container (e.g. 2g, 512m)"
  cpus:
    type: string
    required: false
    default: "2"
    description: "CPU limit per spawned container (e.g. 2, 0.5)"
  pids:
    type: number
    required: false
    default: 256
    description: "PID limit per spawned container"
  allow_compose:
    type: boolean
    required: false
    default: false
    description: "Allow docker compose operations (network create/remove for inner sandboxes)"
  allow_build:
    type: boolean
    required: false
    default: false
    description: "Allow docker build operations (auto-allows buildkit image and build-related endpoints)"
  allowed_capabilities:
    type: array
    items:
      type: string
    required: false
    default: []
    description: "Linux capabilities to allow on spawned containers (e.g. NET_ADMIN, SETUID). Empty means all cap_add is blocked."

contributes:
  runtime:
    environment:
      DOCKER_HOST: "tcp://{{ .agent.name }}-agent-docker-proxy:2375"
    pre_entrypoint:
      - '{{ if .plugin.options.allow_build }}rm -rf "$AGENT_HOME/.docker/buildx/instances" 2>/dev/null || true{{ end }}'
  sidecar:
    services:
      agent-docker-proxy:
        build: {{ asset "cmd/docker-proxy" }}
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"
        environment:
          ALLOWED_IMAGES: '{{ toJSON .plugin.options.allowed_images }}'
          MAX_CONTAINERS: "{{ .plugin.options.max_containers }}"
          MEMORY_LIMIT: "{{ .plugin.options.memory }}"
          CPU_LIMIT: "{{ .plugin.options.cpus }}"
          PID_LIMIT: "{{ .plugin.options.pids }}"
          ALLOW_COMPOSE: "{{ .plugin.options.allow_compose }}"
          ALLOW_BUILD: "{{ .plugin.options.allow_build }}"
          ALLOWED_CAPABILITIES: '{{ toJSON .plugin.options.allowed_capabilities }}'
