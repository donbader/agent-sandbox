name: home-override
options:
  home_directory:
    type: project-path
    required: true
    description: "Path to local directory with agent home contents. Must use @fleet/ prefix (e.g. @fleet/shared-home)."
  volume:
    type: boolean
    required: false
    default: false
    description: "Persist home directory across restarts using a named Docker volume. Config files are re-synced from home_directory on every start."
  sync_paths:
    type: array
    required: false
    description: "Relative paths within home_directory to keep in sync. Files in these paths that no longer exist in the source are deleted from the volume on startup. Use for managed config dirs (e.g. .pi/agent/skills, .pi/agent/extensions)."

contributes:
  runtime:
    extra_builds:
      - "COPY {{ .plugin.options.home_directory }} /opt/home-seed/"
      - "RUN chown -R agent:agent /opt/home-seed"
    pre_entrypoint:
      - 'cp -a /opt/home-seed/. "$AGENT_HOME/"'
      - |
        {{- if .plugin.options.sync_paths }}
        for sync_path in {{ range .plugin.options.sync_paths }}"{{ . }}" {{ end }}; do
          seed_dir="/opt/home-seed/$sync_path"
          home_dir="$AGENT_HOME/$sync_path"
          if [ -d "$home_dir" ] && [ -d "$seed_dir" ]; then
            find "$home_dir" -type f | while read -r f; do
              rel="${f#$AGENT_HOME/}"
              if [ ! -e "/opt/home-seed/$rel" ]; then
                rm -f "$f"
                echo "[home-sync] removed stale: $rel"
              fi
            done
            find "$home_dir" -type d -empty -delete 2>/dev/null || true
          fi
        done
        {{- end }}
    namespaced_volumes:
      - "{{ if .plugin.options.volume }}home:/home/agent{{ end }}"
