name: home-override
options:
  home_directory:
    type: string
    required: true
    description: "Path to local directory with agent home contents (relative to project root)"
  volume:
    type: boolean
    required: false
    default: false
    description: "Persist home directory across restarts using a named Docker volume. Contents are seeded from home_directory on first run."
  volume_name:
    type: string
    required: false
    default: "agent-home"
    description: "Name of the Docker volume for persistent home. Override in fleet mode to avoid conflicts."

contributes:
  runtime:
    extra_builds:
      - "COPY {{ .options.home_directory }} /home/agent/"
      - "RUN chown -R agent:agent /home/agent"
    volumes:
      - "{{ if .options.volume }}{{ .options.volume_name }}:/home/agent{{ else }}{{ .options.home_directory }}:/home/agent{{ end }}"
