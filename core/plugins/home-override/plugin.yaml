name: home-override
options:
  home_directory:
    type: project-path
    required: true
    description: "Path to local directory with agent home contents. Must use @fleet/ prefix (e.g. @fleet/shared-home)."
  volume:
    type: boolean
    required: false
    default: false
    description: "Persist home directory across restarts using a named Docker volume. Config files are re-synced from home_directory on every start."
  clean_stale:
    type: boolean
    required: false
    default: false
    description: "Remove stale files from volume on startup. For each directory that exists in the source, files in the volume that are not in the source are deleted. Directories created only at runtime (not in source) are never touched."

contributes:
  runtime:
    extra_builds:
      - "COPY {{ .plugin.options.home_directory }} /opt/home-seed/"
      - "RUN chown -R agent:agent /opt/home-seed"
    pre_entrypoint:
      - 'cp -a /opt/home-seed/. "$AGENT_HOME/"'
      - |
        {{- if .plugin.options.clean_stale }}
        find /opt/home-seed -type d | while read -r seed_dir; do
          rel="${seed_dir#/opt/home-seed}"
          [ -z "$rel" ] && continue
          home_dir="$AGENT_HOME$rel"
          [ ! -d "$home_dir" ] && continue
          for entry in "$home_dir"/* "$home_dir"/.*; do
            [ ! -e "$entry" ] && continue
            name="$(basename "$entry")"
            [ "$name" = "." ] || [ "$name" = ".." ] && continue
            if [ ! -e "$seed_dir/$name" ]; then
              rm -rf "$entry"
              echo "[home-sync] removed stale: ${entry#$AGENT_HOME/}"
            fi
          done
        done
        {{- end }}
    namespaced_volumes:
      - "{{ if .plugin.options.volume }}home:/home/agent{{ end }}"
