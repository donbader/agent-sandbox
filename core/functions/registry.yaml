# Function Registry — available computed functions for plugins.
#
# Plugins declare which functions they need via `functions:` in plugin.yaml.
# At generate time, the framework executes the corresponding script and
# injects the result into {{ call .plugin.<name> }}.
#
# Scripts receive environment variables:
#   PROJECT_DIR  — absolute path to the config repo root
#   CORE_VERSION — resolved core binary version
#
# The script's stdout (trimmed) becomes the function's return value.
# Non-zero exit code results in "unknown" as the value.

functions:
  gitDescribe:
    script: "scripts/git-describe.sh"
    description: "Git version from project directory (git describe --tags --always)"
  coreVersion:
    script: "scripts/core-version.sh"
    description: "Resolved agent-sandbox core binary version"
