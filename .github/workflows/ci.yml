name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

# Cancel in-progress runs for the same branch/PR — only latest matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed so downstream jobs can skip when irrelevant.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      typescript: ${{ steps.filter.outputs.typescript }}
      examples: ${{ steps.filter.outputs.examples }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - '.golangci.yml'
            typescript:
              - 'channel-manager/**'
            examples:
              - 'internal/generate/**'
              - 'internal/plugins/**'
              - 'internal/config/**'
              - 'internal/resolve/**'
              - 'cmd/**'
              - 'channel-manager/**'
              - 'gateway/**'
              - 'examples/**'
              - 'embed.go'

  go:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest
    needs: changes
    # Run when Go files change OR when examples need the CLI binary
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.examples == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        id: lint

      - name: Test
        run: go test -race ./...

      - name: Build CLI
        run: go build -o agent-sandbox ./cmd/agent-sandbox/

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-sandbox-linux
          path: agent-sandbox
          retention-days: 1

      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1

  typescript:
    name: TypeScript (typecheck, test)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    defaults:
      run:
        working-directory: channel-manager
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: channel-manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

  examples:
    name: Examples (generate + docker build)
    runs-on: ubuntu-latest
    needs: [changes, go]
    if: needs.changes.outputs.examples == 'true'
    strategy:
      fail-fast: false
      matrix:
        example: [telegram-vibe, local-coding, multi-agent]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: agent-sandbox-linux

      - name: Make CLI executable
        run: chmod +x ./agent-sandbox

      - name: Generate build artifacts
        run: ./agent-sandbox generate -C examples/${{ matrix.example }}

      - name: Docker build (with layer cache)
        working-directory: examples/${{ matrix.example }}/.build
        run: docker buildx bake --file docker-compose.yml --set "*.cache-from=type=gha" --set "*.cache-to=type=gha,mode=max"
