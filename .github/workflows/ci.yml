name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR — only latest matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed so downstream jobs can skip when irrelevant.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      artifacts: ${{ steps.filter.outputs.artifacts }}
      shim: ${{ steps.filter.outputs.shim }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - '.golangci.yml'
            artifacts:
              - 'internal/generate/**'
              - 'internal/plugin/**'
              - 'internal/config/**'
              - 'core/plugins/**'
              - 'core/gateway/**'
              - 'core/presets/**'
              - 'cmd/**'
              - 'examples/**'
              - 'tests/integration/**'
              - 'scripts/**'
            shim:
              - 'scripts/**'
              - 'tests/shim/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: golangci/golangci-lint-action@v9

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -race ./...

  codegen:
    name: Codegen freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Lint TS annotations
        run: go run ./cmd/lint-ts-annotations

      - name: Check generated files are up to date
        run: |
          go generate ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: 'go generate ./...' produced uncommitted changes:"
            git diff --stat
            git diff
            exit 1
          fi

  shim:
    name: Shim tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.shim == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build CLI (needed by shim tests)
        run: go build -o agent-sandbox-core ./cmd/agent-sandbox-core/

      - name: Lint shell scripts
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/shim.sh scripts/install.sh
          else
            echo "shellcheck not available, skipping"
          fi

      - name: Run shim unit tests
        run: tests/shim/test_fleet_resolution.sh

      - name: Run shim e2e tests
        run: tests/shim/test_shim_e2e.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.artifacts == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build CLI binary
        run: go build -o agent-sandbox-core ./cmd/agent-sandbox-core/

      - name: Build gateway binary
        run: |
          mkdir -p core/gateway/bin
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o core/gateway/bin/gateway-linux-amd64 ./core/gateway/cmd/gateway/

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-sandbox-core-linux
          path: agent-sandbox-core
          retention-days: 1

      - name: Upload gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: gateway-linux-amd64
          path: core/gateway/bin/gateway-linux-amd64
          retention-days: 1

  examples:
    name: Examples (${{ matrix.example }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build]
    if: needs.changes.outputs.artifacts == 'true'
    strategy:
      fail-fast: false
      matrix:
        example: [telegram, local-coding, multi-agent]
    steps:
      - uses: actions/checkout@v6

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: agent-sandbox-core-linux
          path: core

      - name: Download gateway binary
        uses: actions/download-artifact@v4
        with:
          name: gateway-linux-amd64
          path: core/gateway/bin

      - name: Make binaries executable
        run: |
          chmod +x ./core/agent-sandbox-core
          chmod +x ./core/gateway/bin/gateway-linux-amd64

      - name: Generate build artifacts
        run: ./core/agent-sandbox-core generate -C examples/${{ matrix.example }}

      - name: Start containers (smoke test)
        env:
          STX_LLM_GATEWAY_API_KEY: test-stub
          TELEGRAM_BOT_TOKEN: test-stub
        run: |
          ./core/agent-sandbox-core -C examples/${{ matrix.example }} compose up -d --build || true
          # Wait for gateway(s) to be healthy — proves mounts, config, and binary work.
          for i in $(seq 1 30); do
            if docker ps --filter "name=gateway" --filter "health=healthy" --format '{{.Names}}' | grep -q gateway; then
              echo "Gateway healthy"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: No healthy gateway after 60s"
          ./core/agent-sandbox-core -C examples/${{ matrix.example }} compose ps
          ./core/agent-sandbox-core -C examples/${{ matrix.example }} compose logs
          exit 1

      - name: Audit security contract
        run: ./core/agent-sandbox-core -C examples/${{ matrix.example }} audit || true

      - name: Teardown
        if: always()
        run: ./core/agent-sandbox-core -C examples/${{ matrix.example }} compose down -v

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build]
    if: needs.changes.outputs.artifacts == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: agent-sandbox-core-linux
          path: core

      - name: Download gateway binary
        uses: actions/download-artifact@v4
        with:
          name: gateway-linux-amd64
          path: core/gateway/bin

      - name: Make binaries executable
        run: |
          chmod +x ./core/agent-sandbox-core
          chmod +x ./core/gateway/bin/gateway-linux-amd64

      - name: Run integration tests
        env:
          CLI_PATH: ${{ github.workspace }}/core/agent-sandbox-core
        run: tests/integration/sandbox/run.sh
