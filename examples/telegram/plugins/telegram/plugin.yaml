name: telegram
options:
  bot_token:
    type: string
    required: true
    description: "Telegram bot token (passed to gateway for token rewrite)"
  allowed_users:
    type: array
    required: false
    description: "Telegram usernames allowed to interact"
    items:
      type: string

contributes:
  gateway:
    services:
      - url: https://api.telegram.org
        headers:
          X-Telegram-Bot-Token: "{{ .options.bot_token }}"
        middlewares:
          - custom: "./middlewares/telegram-token-rewrite.go"
