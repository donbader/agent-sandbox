# yaml-language-server: $schema=../.build/schema.json
name: coder
core_version: latest
log_level: debug
runtime:
  image: "@builtin/claude-code"
  entrypoint: ["sleep", "infinity"]
gateway:
  services:
    - url: https://agent-gateway.stx-ai.net
      headers:
        Authorization: Bearer ${STX_LLM_GATEWAY_API_KEY}
installations:
  - plugin: "@builtin/home-override"
    options:
      home_directory: "@fleet/home"
      volume: true
  - plugin: "@builtin/mcp-oauth"
    options:
      providers:
        notion:
          mcp_url: https://mcp.notion.com/mcp
  - plugin: "@builtin/agent-docker"
    options:
      allowed_images:
        - "alpine:*"
        - "node:20-*"
        - "python:3.12-*"
        - "postgres:16-*"
        - "redis:7-*"
      max_containers: 10
      memory: "2g"
      cpus: "2"
      pids: 256
      allow_compose: true
