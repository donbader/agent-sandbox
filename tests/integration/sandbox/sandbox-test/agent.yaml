# yaml-language-server: $schema=../.build/schema.json
# Minimal agent config for sandbox integration tests.
# Uses gateway egress rules to trigger MITM proxy mode.
name: sandbox-test
core_version: latest
log_level: debug
runtime:
  image: "@builtin/codex"
  entrypoint: ["sleep", "infinity"]
gateway:
  egress:
    - hosts: ["httpbin.org"]
      headers:
        Authorization: Bearer ${TEST_SECRET}
    - hosts: ["*"]
